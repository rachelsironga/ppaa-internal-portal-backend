upstream backend {
    server backend-container:8000;
}


server {
    listen 80;
    # LAN production (192.168.1.0/24): allow requests when users open http://192.168.1.4:8092/ etc.
    server_name _ localhost 127.0.0.1 192.168.1.4;

    # Default nginx is 1m → 413 on document uploads (JSON + base64 is ~4/3 raw size).
    # Internal portal documents allow up to 20MB decoded (see internal_portal_views._store_uploaded_data_url).
    client_max_body_size 35m;

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        send_timeout 300s;
    }

    location /static/ {
        alias /app/static/;
    }

    location /media/ {
        alias /app/media/;
    }
}
