<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>New message on your Maoni suggestion</title>
</head>
<body style="font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; line-height: 1.5; color: #1e293b;">
  <p>Hello {{ contributor_name }},</p>
  <p>
    <strong>{{ staff_name }}</strong> posted a new message on your Maoni suggestion
    <strong>{{ suggestion_title }}</strong>.
  </p>
  <blockquote style="margin: 1rem 0; padding: 0.75rem 1rem; border-left: 4px solid #22c55e; background: #f8fafc;">
    {{ preview }}
  </blockquote>
  <p>
    <a href="{{ detail_url }}" style="display: inline-block; padding: 0.5rem 1rem; background: #16a34a; color: #fff; text-decoration: none; border-radius: 6px;">
      Open suggestion in the portal
    </a>
  </p>
  <p style="font-size: 0.875rem; color: #64748b;">
    If the button does not work, copy this link into your browser:<br />
    <span style="word-break: break-all;">{{ detail_url }}</span>
  </p>
</body>
</html>
