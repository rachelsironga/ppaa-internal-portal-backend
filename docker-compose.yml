services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P@ssw0rd
      POSTGRES_DB: mnh_approval_db
    ports:
      - "5433:5432"
    volumes:
      - /opt/mnh-data/postgres:/var/lib/postgresql/data
    networks:
      - mnh-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mnh.com
      PGADMIN_DEFAULT_PASSWORD: P@ssw0rd
    ports:
      - "8099:80"
    volumes:
      - /opt/mnh-data/pgadmin:/var/lib/pgadmin
    networks:
      - mnh-network
    depends_on:
      - postgres

  backend:
    image: mnh-connect-backend
    container_name: backend-container
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - mnh-network
    volumes:
      - ./:/app
      - static_volume:/app/static
      - media_volume:/app/media
    expose:
      - "8000"
    environment:
      POSTGRES_DB_NAME: "mnh_approval_db"
      POSTGRES_DB_USER: "postgres"
      POSTGRES_DB_PWD: "P@ssw0rd"
      POSTGRES_DB_HOST: "postgres"
      POSTGRES_DB_PORT: 5432
    env_file:
      - .env
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx-container
    ports:
      - "8092:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - backend
    networks:
      - mnh-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: patrick.nachenga
      MINIO_ROOT_PASSWORD: P@ssw0rd
    volumes:
      - /opt/mnh-data/minio-data:/data
    networks:
      - mnh-network
    restart: unless-stopped

volumes:
  static_volume:
  media_volume:

networks:
  mnh-network:
    driver: bridge
    external: true
