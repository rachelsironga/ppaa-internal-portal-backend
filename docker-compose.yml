version: '3'

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P@ssw0rd
      POSTGRES_DB: mnh_approval_db
    ports:
      - "5433:5432"
    volumes:
      - /opt/mnh-data/postgres:/var/lib/postgresql/data
    networks:
      - mnh-network

  backend:
    image: mnh-connect-backend
    container_name: backend-container
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - mnh-network
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    expose:
      - "8000"
    environment:
      POSTGRES_DB_NAME: "mnh_approval_db"
      POSTGRES_DB_USER: "postgres"
      POSTGRES_DB_PWD: "P@ssw0rd"
      POSTGRES_DB_HOST: "postgres"
      POSTGRES_DB_PORT: 5432
    env_file:
      - .env
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx-container
    ports:
      - "8092:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - backend
    networks:
      - mnh-network
    restart: unless-stopped

volumes:
  static_volume:
  media_volume:

networks:
  mnh-network:
    external: true
