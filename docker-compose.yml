services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P@ssw0rd
      POSTGRES_DB: ppaa_internal_portal
    ports:
      - "5433:5432"
    volumes:
      - /opt/ppaa-data/postgres:/var/lib/postgresql/data
      - ./init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - ppaa-network

  # Ensures required databases exist even when the Postgres volume already exists.
  # Note: docker-entrypoint-initdb.d scripts only run on first init (empty data dir).
  db_init:
    image: postgres:16
    container_name: ppaa-db-init
    depends_on:
      - postgres
    networks:
      - ppaa-network
    restart: "no"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P@ssw0rd
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    command:
      [
        "bash",
        "-lc",
        "until pg_isready -h \"$POSTGRES_HOST\" -p \"$POSTGRES_PORT\" -U \"$POSTGRES_USER\"; do echo \"Waiting for postgres...\"; sleep 1; done; \
         export PGPASSWORD=\"$POSTGRES_PASSWORD\"; \
         psql -h \"$POSTGRES_HOST\" -p \"$POSTGRES_PORT\" -U \"$POSTGRES_USER\" -d postgres -v ON_ERROR_STOP=1 -c \"SELECT 'ppaa_internal_portal'\" >/dev/null; \
         for db in ppaa_internal_portal performance_dashboard_db maoni_db reports_management_db; do \
           echo \"Ensuring database exists: $db\"; \
           psql -h \"$POSTGRES_HOST\" -p \"$POSTGRES_PORT\" -U \"$POSTGRES_USER\" -d postgres -tc \"SELECT 1 FROM pg_database WHERE datname='$db'\" | grep -q 1 || \
             psql -h \"$POSTGRES_HOST\" -p \"$POSTGRES_PORT\" -U \"$POSTGRES_USER\" -d postgres -c \"CREATE DATABASE \\\"$db\\\";\"; \
         done; \
         echo \"Database init complete.\""
      ]
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ppaa.go.tz
      PGADMIN_DEFAULT_PASSWORD: P@ssw0rd
    ports:
      - "8099:80"
    volumes:
      - /opt/ppaa-data/pgadmin:/var/lib/pgadmin
    networks:
      - ppaa-network
    depends_on:
      - postgres
  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - ppaa-network

  backend:
    image: ppaa-internal-portal-backend
    container_name: backend-container
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${DOCKER_PYTHON_IMAGE:-public.ecr.aws/docker/library/python:3.12-slim}
    networks:
      - ppaa-network
    volumes:
      - ./:/app
      - static_volume:/app/static
      - media_volume:/app/media
    # expose:
    ports:
      - "8000:8000"
    environment:
      # Default to production settings inside containers (override in .env if needed)
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-ppaa_portal.settings_prod}

      # LAN defaults (CORS/CSRF + Maoni email links); override in .env
      LAN_HOST: "192.168.1.4"
      LAN_SUBNET_CIDR: "192.168.1.0/24"
      FRONTEND_URL: "http://192.168.1.4:3000"

      # PostgreSQL
      POSTGRES_DB_NAME: "ppaa_internal_portal"
      POSTGRES_DB_USER: "postgres"
      POSTGRES_DB_PWD: "P@ssw0rd"
      POSTGRES_DB_HOST: "postgres"
      POSTGRES_DB_PORT: 5432


# Maoni Microservice Database
      MAONI_DB_NAME: "maoni_db"
      MAONI_DB_USER: "postgres"
      MAONI_DB_PWD: "P@ssw0rd"
      MAONI_DB_HOST: "postgres"
      MAONI_DB_PORT: 5432

      # PPAA Reports Database
      REPORTS_DB_NAME: "ppaa_reports"
      RMS_REPORTS_BUCKET: "reports-management"

      # 🔥 CELERY + REDIS
      CELERY_BROKER_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0

      # MinIO (S3 API) — flyers, documents, media use default_storage → must reach the minio service by Docker DNS.
      # Set AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY in .env to match MINIO_ROOT_USER / MINIO_ROOT_PASSWORD below.
      AWS_S3_ENDPOINT_URL: "http://minio:9000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
      - minio
      - db_init

  celery_worker:
    image: ppaa-internal-portal-backend
    container_name: celery-worker
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A ppaa_portal.config.celery_app worker --loglevel=info

    volumes:
      - ./:/app
    networks:
      - ppaa-network
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-ppaa_portal.settings_prod}

      LAN_HOST: "192.168.1.4"
      LAN_SUBNET_CIDR: "192.168.1.0/24"
      FRONTEND_URL: "http://192.168.1.4:3000"

      # Same DB connection
      POSTGRES_DB_NAME: "ppaa_internal_portal"
      POSTGRES_DB_USER: "postgres"
      POSTGRES_DB_PWD: "P@ssw0rd"
      POSTGRES_DB_HOST: "postgres"
      POSTGRES_DB_PORT: 5432

      # PPAA Reports Database
      REPORTS_DB_NAME: "ppaa_reports"
      RMS_REPORTS_BUCKET: "reports-management"

      # Celery + Redis
      CELERY_BROKER_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0

      AWS_S3_ENDPOINT_URL: "http://minio:9000"
    env_file:
      - .env
    depends_on:
      - redis
      - backend
      - minio
    restart: unless-stopped

  celery_beat:
    image: ppaa-internal-portal-backend
    container_name: celery-beat
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${DOCKER_PYTHON_IMAGE:-public.ecr.aws/docker/library/python:3.12-slim}
    command: ["celery", "-A", "ppaa_portal.config.celery_app", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]
    volumes:
      - ./:/app
    networks:
      - ppaa-network
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-ppaa_portal.settings_prod}
      POSTGRES_DB_NAME: "ppaa_internal_portal"
      POSTGRES_DB_USER: "postgres"
      POSTGRES_DB_PWD: "P@ssw0rd"
      POSTGRES_DB_HOST: "postgres"
      POSTGRES_DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      AWS_S3_ENDPOINT_URL: "http://minio:9000"
    env_file:
      - .env
    depends_on:
      - redis
      - backend
      - minio
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx-container
    ports:
      - "8092:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - backend
    networks:
      - ppaa-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: rachel.sironga
      MINIO_ROOT_PASSWORD: P@ssw0rd
    volumes:
      - /opt/ppaa-data/minio-data:/data
    networks:
      - ppaa-network
    restart: unless-stopped

volumes:
  static_volume:
  media_volume:

networks:
  ppaa-network:
    driver: bridge
    # external: true
